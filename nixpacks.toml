[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc", "libpq", "zlib", "libjpeg", "libpng", "freetype"]

[phases.install]
cmds = [
  "python3.11 -m pip install --upgrade pip setuptools wheel",
  "python3.11 -m pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "python3.11 manage.py collectstatic --noinput",
  "python3.11 manage.py migrate"
]

[start]
cmd = "python3.11 -m gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2"
