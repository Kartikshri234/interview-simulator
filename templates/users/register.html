{% extends 'base.html' %}
{% block title %}Register | InterviewAI{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card wide">
    <div class="auth-logo">
      <span>◈</span> InterviewAI
    </div>

    <h1>Create your account</h1>
    <p class="subtitle">Set your target role and level to get personalized interview sessions.</p>

    <form method="post" action="{% url 'register' %}">
      {% csrf_token %}

      <div class="grid two">
        <label>
          Username
          <input type="text" name="username" required autocomplete="username" placeholder="yourname">
        </label>
        <label>
          Email address
          <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
        </label>
      </div>

      <div class="grid two">
        <label>
          Password
          <input type="password" name="password" required autocomplete="new-password" minlength="8" placeholder="Min. 8 characters">
        </label>
        <label>
          Confirm password
          <input type="password" name="password2" required autocomplete="new-password" minlength="8" placeholder="Repeat password">
        </label>
      </div>

      <div class="grid two">
        <label>
          Target role <span style="color:var(--text-3);font-size:0.75rem;">(optional)</span>
          <input type="text" name="target_role" placeholder="e.g. Backend Engineer">
        </label>
        <label>
          Experience level
          <select name="experience_level">
            <option value="junior">🟢 Junior</option>
            <option value="mid" selected>🔵 Mid-level</option>
            <option value="senior">🟣 Senior</option>
          </select>
        </label>
      </div>

      <button type="submit" style="margin-top:4px; width:100%; padding:13px;">Create account →</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
