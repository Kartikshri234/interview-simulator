{% extends 'base.html' %}
{% block title %}Login | InterviewAI{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <span>◈</span> InterviewAI
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue your interview practice.</p>

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <label>
        Email address
        <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
      </label>
      <label>
        Password
        <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      </label>
      <button type="submit" style="margin-top:4px; width:100%; padding:13px;">Sign in →</button>
    </form>

    <div class="auth-footer">
      No account yet? <a href="{% url 'register' %}">Create one free</a>
    </div>
  </div>
</div>
{% endblock %}
