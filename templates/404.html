{% extends 'base.html' %}
{% block title %}404 — Page Not Found | InterviewAI{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:16px;">
  <div style="font-size:72px;line-height:1;">🔍</div>
  <h1 style="font-size:2rem;margin:0;">Page not found</h1>
  <p style="color:var(--text-2);max-width:420px;margin:0;">
    The page you're looking for doesn't exist or has been moved.
  </p>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px;">
    <a class="button" href="{% url 'dashboard' %}">Go to Dashboard</a>
    <a class="button alt" href="{% url 'home' %}">Home</a>
  </div>
</div>
{% endblock %}
